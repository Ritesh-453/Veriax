services:
  - type: web
    name: veriax-sportshield
    runtime: python
    buildCommand: pip install --upgrade pip && pip install torch==2.3.1+cpu torchvision==0.18.1+cpu --index-url https://download.pytorch.org/whl/cpu && pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: UPLOAD_FOLDER
        value: uploads
      - key: DATABASE
        value: database/sportshield.db